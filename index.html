<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeroporto Inteligente - Terminal 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="painel-voo">
        <h1>Painel de Controle de Voo</h1>
        
        <!-- Imagem do Avião -->
        <div class="container-aviao">
            <img id="img-aviao" src="aviao.png" alt="Avião" width="200">
        </div>





         <div class="container-aviao">
            <img id="img-aviao" src="aviaorosa.avif" alt="Avião" width="200">
        </div>
        <!-- Informações do Voo -->
        <div class="info-voo">
            <p><strong>Código:</strong> <span id="txt-codigo">---</span></p>
            <p><strong>Origem:</strong> <span id="txt-origem">---</span></p>
            <p><strong>Destino:</strong> <span id="txt-destino">---</span></p>
            <p><strong>Altitude:</strong> <span id="txt-altitude">0</span> pés</p>
            <p><strong>Status:</strong> <span id="txt-status" class="status-solo">No Solo</span></p>
        </div>

        <!-- Botões de Ação -->
        <div class="controles">
            <button onclick="meuVoo.decolar()">Decolar</button>
            <button onclick="meuVoo.ganharAltitude()">Subir (+1000ft)</button>
            <button onclick="meuVoo.pousar()">Pousar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
